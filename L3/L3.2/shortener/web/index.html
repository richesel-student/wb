<!DOCTYPE html>
<html>
<head>
  <title>Shortener</title>
</head>
<body>

<h2>Create Short URL</h2>

<input id="url" placeholder="Enter URL">
<input id="custom" placeholder="Custom (optional)">
<button onclick="create()">Create</button>

<p id="result"></p>

<script>
async function create() {
  const res = await fetch('/shorten', {
    method: 'POST',
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      url: document.getElementById('url').value,
      custom: document.getElementById('custom').value
    })
  })

  const data = await res.json()

  document.getElementById('result').innerHTML =
    `<a href="/s/${data.short}">${location.origin}/s/${data.short}</a>
     <br>
     <a href="/analytics.html?short=${data.short}">View analytics</a>`
}
</script>

</body>
</html>
