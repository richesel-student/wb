    <!DOCTYPE html>
<html>
<head>
  <title>Comments</title>
</head>
<body>

<h2>Comments</h2>

<input id="search" placeholder="Search..." />
<button onclick="load()">Search</button>

<br><br>

<textarea id="text"></textarea><br>
<button onclick="create()">Add Comment</button>

<div id="comments"></div>

<script>
async function load() {
  const search = document.getElementById('search').value
  const res = await fetch(`/comments?search=${search}`)
  const data = await res.json()

  const container = document.getElementById('comments')
  container.innerHTML = ''

  function render(comments, level = 0) {
    comments.forEach(c => {
      const div = document.createElement('div')
      div.style.marginLeft = level * 20 + 'px'
      div.innerHTML = `
        ${c.text}
        <button onclick="del(${c.id})">X</button>
        <button onclick="reply(${c.id})">Reply</button>
      `
      container.appendChild(div)

      if (c.children) {
        render(c.children, level + 1)
      }
    })
  }

  render(data)
}

async function create(parent_id = null) {
  const text = document.getElementById('text').value

  await fetch('/comments', {
    method: 'POST',
    body: JSON.stringify({ text, parent_id }),
  })

  load()
}

function reply(id) {
  const text = prompt("Reply:")
  if (!text) return

  fetch('/comments', {
    method: 'POST',
    body: JSON.stringify({ text, parent_id: id }),
  }).then(load)
}

function del(id) {
  fetch(`/comments/${id}`, { method: 'DELETE' })
    .then(load)
}

load()
</script>

</body>
</html>
