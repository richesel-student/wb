<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>EventBooker</title>
</head>
<body>

<h2>Create Event</h2>
<form method="post" action="/api/events">
    Name: <input name="name" required><br>
    Date: <input name="date" placeholder="YYYY-MM-DD" required><br>
    Capacity: <input name="capacity" required><br>
    TTL (minutes): <input name="ttl" value="5"><br>
    <button type="submit">Create</button>
</form>

<hr>

<h2>Events</h2>

<table border="1">
<tr>
    <th>Name</th>
    <th>Date</th>
    <th>Seats</th>
    <th>Action</th>
</tr>

{{range .}}
<tr>
    <td>{{.Name}}</td>
    <td>{{.Date}}</td>
    <td>{{.AvailableSeats}} / {{.Capacity}}</td>
    <td>
        <form method="post" action="/api/events/{{.ID}}/book">
            <input type="hidden" name="user" value="demo-user">
            <button>Book</button>
        </form>
    </td>
</tr>
{{end}}

</table>

</body>
</html>
